services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.31.0
    container_name: weaviate
    environment:
      - TZ=${TZ}
    ports:
      - 8089:8080
      - 50051:50051
      - 18084:18084
    volumes:
      - ${APP_DATA_DIR}/data:/var/lib/weaviate
    restart: unless-stopped
    networks:
      - tipi_main_network
    labels:
      runtipi.managed: true
