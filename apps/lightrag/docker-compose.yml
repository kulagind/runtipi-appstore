services:
  lightrag:
    image: ghcr.io/hkuds/lightrag:1.3.8
    container_name: lightrag
    environment:
      - TZ=${TZ}
    ports:
      - 9621:9621
      - 18085:18085
    volumes:
      - ${APP_DATA_DIR}/data/rag_storage:/app/data/rag_storage
      - ${APP_DATA_DIR}/data/inputs:/app/data/inputs
      - ${APP_DATA_DIR}/data/config.ini:/app/config.ini
      - ${APP_DATA_DIR}/data/.env:/app/.env
    restart: unless-stopped
    networks:
      - tipi_main_network
    labels:
      runtipi.managed: true
